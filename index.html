<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Analysis Tool v2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="panel-viz">
        <div class="header-viz">
            <button id="btn-theme">🌓 Modo Oscuro</button>
        </div>
        
        <div id="canvas-container">
            <canvas id="myChart"></canvas>
        </div>
        
        <div id="txt-res">Esperando cálculos...</div>

        <div id="tabla-container" style="display: none;">
            <h3>Tabla de Iteraciones</h3>
            <table id="tabla-pasos">
                <thead>
                    <tr>
                        <th>i</th>
                        <th>a[i]</th>
                        <th>b[i]</th>
                        <th>Xp[i]</th>
                        <th>f(Xp[i])</th>
                        <th>Error (DXp)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="panel-inputs">
        <h2>CONFIGURACIÓN</h2>
        
        <div class="input-group">
            <label>Método:</label>
            <select id="menu-metodo">
                <option value="Bisección">Bisección</option>
                <option value="Regula Falsi">Regula Falsi</option>
                <option value="Newton-Raphson">Newton-Raphson</option>
                <option value="Secante">Secante</option>
                <option value="Punto Fijo">Punto Fijo</option> 
            </select>
        </div>

        <div class="input-group">
            <label>Función f(x) / g(x):</label>
            <input type="text" id="ent-func" value="x^3 - x^2 + 2">
        </div>

        <div class="input-group">
            <label>Punto x0 / Lim inf (a):</label>
            <input type="number" id="ent-a" value="-2" step="any">
        </div>

        <div class="input-group">
            <label>Punto x1 / Lim sup (b):</label>
            <input type="number" id="ent-b" value="2" step="any">
        </div>

        <div class="input-group">
            <label>Tolerancia:</label>
            <input type="number" id="ent-tol" value="0.0001" step="any">
        </div>

        <div class="button-row">
            <button id="btn-calc">CALCULAR</button>
            <button id="btn-clear">LIMPIAR</button>
            <button id="btn-comparar" onclick="compararMetodos()">COMPARAR</button>
        </div>

        <div id="historial-container">
            <h3>Historial Reciente</h3>
            <div id="historial-lista"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
